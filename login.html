<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinanceFlow — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f9fa;
    --surface: #ffffff;
    --surface2: #f1f3f5;
    --border: #e2e8f0;
    --text: #1a1a2e;
    --text2: #64748b;
    --text3: #94a3b8;
    --green: #22c55e;
    --blue: #38bdf8;
    --red: #ef4444;
    --yellow: #f59e0b;
    --luiz: #6366f1;
    --fernanda: #ec4899;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Background decorativo */
  body::before {
    content: '';
    position: fixed;
    top: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(99,102,241,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(34,197,94,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    width: 400px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
    animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .brand {
    text-align: center;
    margin-bottom: 36px;
  }

  .brand-icon {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--luiz), #818cf8);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    font-size: 22px;
    box-shadow: 0 4px 12px rgba(99,102,241,0.25);
  }

  .brand h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.75rem;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .brand p {
    font-size: 0.85rem;
    color: var(--text2);
    margin-top: 4px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 6px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  input {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--text);
    background: var(--bg);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  input:focus {
    border-color: var(--luiz);
    box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
    background: #fff;
  }

  .pw-wrap {
    position: relative;
  }

  .pw-wrap input {
    padding-right: 44px;
  }

  .toggle-pw {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    cursor: pointer;
    color: var(--text3);
    font-size: 1rem;
    padding: 4px;
    transition: color 0.2s;
  }

  .toggle-pw:hover { color: var(--text2); }

  .btn-login {
    width: 100%;
    padding: 13px;
    background: var(--luiz);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 2px 8px rgba(99,102,241,0.25);
  }

  .btn-login:hover {
    background: #4f52d9;
    box-shadow: 0 4px 16px rgba(99,102,241,0.35);
  }

  .btn-login:active { transform: scale(0.98); }

  .btn-login:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  .error-msg {
    display: none;
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #dc2626;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 0.85rem;
    margin-top: 12px;
    text-align: center;
  }

  .error-msg.show { display: block; }

  .footer-note {
    text-align: center;
    margin-top: 24px;
    font-size: 0.78rem;
    color: var(--text3);
  }
</style>
</head>
<body>

<div class="login-card">
  <div class="brand">
    <div class="brand-icon">💸</div>
    <h1>FinanceFlow</h1>
    <p>Gestão financeira do casal</p>
  </div>

  <div class="form-group">
    <label>E-mail</label>
    <input type="email" id="emailInput" placeholder="seu@email.com" autocomplete="email">
  </div>

  <div class="form-group">
    <label>Senha</label>
    <div class="pw-wrap">
      <input type="password" id="pwInput" placeholder="••••••••" autocomplete="current-password">
      <button class="toggle-pw" type="button" id="togglePw" title="Mostrar/ocultar senha">👁</button>
    </div>
  </div>

  <button class="btn-login" id="btnLogin">Entrar</button>
  <div class="error-msg" id="errorMsg">E-mail ou senha incorretos.</div>

  <p class="footer-note">FinanceFlow © 2026</p>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAlaSCG6_ySigv2Nv_HxTSXplismspTSw0",
    authDomain: "financeflow-321d3.firebaseapp.com",
    projectId: "financeflow-321d3",
    storageBucket: "financeflow-321d3.firebasestorage.app",
    messagingSenderId: "891905237123",
    appId: "1:891905237123:web:18945142d3f8ffa36f7bb6"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  auth.onAuthStateChanged(function(user) {
    if (user) window.location.href = 'app.html';
  });

  const emailInput = document.getElementById('emailInput');
  const pwInput    = document.getElementById('pwInput');
  const btnLogin   = document.getElementById('btnLogin');
  const errorMsg   = document.getElementById('errorMsg');
  const togglePw   = document.getElementById('togglePw');

  togglePw.addEventListener('click', function() {
    const isText = pwInput.type === 'text';
    pwInput.type = isText ? 'password' : 'text';
    togglePw.textContent = isText ? '👁' : '🙈';
  });

  function doLogin() {
    const email = emailInput.value.trim();
    const pw    = pwInput.value;
    if (!email || !pw) { showError('Preencha e-mail e senha.'); return; }

    btnLogin.disabled = true;
    btnLogin.textContent = 'Entrando...';
    errorMsg.classList.remove('show');

    auth.signInWithEmailAndPassword(email, pw)
      .then(function() {
        window.location.href = 'app.html';
      })
      .catch(function() {
        showError('E-mail ou senha incorretos.');
        btnLogin.disabled = false;
        btnLogin.textContent = 'Entrar';
      });
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('show');
  }

  btnLogin.addEventListener('click', doLogin);
  pwInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
  emailInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') pwInput.focus(); });
</script>
</body>
</html>
